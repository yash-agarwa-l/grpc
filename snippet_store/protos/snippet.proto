syntax = "proto3";
package snippet;

service SnippetStore {
  rpc SaveSnippet    (SaveRequest)   returns (SaveResponse);
  rpc FetchSnippet   (FetchRequest)  returns (Snippet);
  rpc ListByLanguage (ListRequest)   returns (stream Snippet);
  rpc DeleteSnippet  (DeleteRequest) returns (DeleteResponse);
}

message Snippet {
  string id         = 1;
  string title      = 2;
  string language   = 3;
  string code       = 4;
  repeated string tags = 5;
  string saved_at   = 6;
}

message SaveRequest {
  string title    = 1;
  string language = 2;
  string code     = 3;
  repeated string tags = 4;
}

message SaveResponse {
  string id       = 1;
  string saved_at = 2;
}

message FetchRequest  { string id = 1; }

message ListRequest {
  string language = 1;
  int32  limit    = 2;
}

message DeleteRequest { string id = 1; }

message DeleteResponse {
  bool   success = 1;
  string message = 2;
}
